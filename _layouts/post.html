---
layout: default
---
<article class="page-content">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>
  {% include post_labels.html post=page %}
  <div class="post-body">
    {{ content }}
  </div>

  {% if site.cusdis_app_id != "" %}
  <div class="comments">
    <h2>Comments</h2>
    <div id="cusdis_thread"
      data-host="https://cusdis.com"
      data-app-id="{{ site.cusdis_app_id }}"
      data-page-id="{{ page.url }}"
      data-page-url="{{ page.url | absolute_url }}"
      data-page-title="{{ page.title | xml_escape }}">
    </div>
    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
  </div>
  {% endif %}
</article>
