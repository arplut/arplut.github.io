backend:
  name: github
  repo: arplut/arplut.github.io
  branch: main
  # base_url points to the OAuth proxy that performs the GitHub token exchange.
  # Not deployed yet — fill in once the proxy (e.g. a Cloudflare Worker) is live.
  # base_url: https://<your-oauth-proxy>
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: posts
    label: Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - label: Category
        name: categories
        widget: select
        options:
          - { label: Poems, value: poems }
          - { label: Reflections on Life, value: reflections }
          - { label: Sci-Tech, value: sci-tech }
          - { label: Spirituality, value: spirituality }
          - { label: Miscellany, value: miscellany }
        multiple: false
      - label: Category (display name)
        name: category
        widget: select
        options:
          - Poems
          - Reflections on Life
          - Sci-Tech
          - Spirituality
          - Miscellany
      - { label: Excerpt, name: excerpt, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }
