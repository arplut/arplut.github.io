<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work in Progress</title>
<style>
  :root {
    color-scheme: light dark;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    text-align: center;
    padding: 1.5rem;
  }

  main {
    max-width: 32rem;
  }

  h1 {
    font-size: clamp(1.75rem, 5vw, 2.5rem);
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  p {
    font-size: 1.1rem;
    line-height: 1.6;
    color: #cbd5e1;
    margin-bottom: 1.75rem;
  }

  a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #0f172a;
    background: #38bdf8;
    padding: 0.65rem 1.25rem;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 600;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  a:hover {
    background: #7dd3fc;
    transform: translateY(-1px);
  }
</style>
</head>
<body>
<main>
  <h1>A BrainLOG by Pratul<br>Work in Progress 🚧</h1>
  <p>Currently revamping my blog. In the meantime, feel free to connect with me on LinkedIn.</p>
  <a href="https://www.linkedin.com/in/pratulvenkatesh/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
</main>
</body>
</html>
